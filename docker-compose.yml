name: veritas

# Full local stack: FastAPI backend + Qdrant vector DB + Next.js frontend.
# The backend is offline-first, so Qdrant is only needed when VERITAS_VECTOR=qdrant.

services:
  backend:
    build: .
    environment:
      VERITAS_VECTOR: qdrant
      QDRANT_URL: http://qdrant:6333
      # ANTHROPIC_API_KEY / OPENAI_API_KEY: set to use real models (else mock)
    ports: ["8000:8000"]
    depends_on: [qdrant]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant-data:/qdrant/storage"]

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports: ["3000:3000"]
    depends_on: [backend]

volumes:
  qdrant-data:
